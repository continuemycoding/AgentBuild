name: AgentBuild
description: Generate build workflow and AI-fix CI on failure
branding:
  icon: package
  color: blue

inputs:
  mode:
    description: bootstrap | fix | auto
    required: false
    default: auto

outputs:
  pr-url:
    description: Pull request URL if created

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: "22"
    - shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci --cache .npm-cache && npm run build
    - shell: bash
      working-directory: ${{ github.action_path }}
      run: node dist/index.js
