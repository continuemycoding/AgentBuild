# 复制到你的项目：.github/workflows/agentbuild.yml

name: AgentBuild

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Build]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  actions: read

jobs:
  agentbuild:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
       github.event.workflow_run.conclusion == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: continuemycoding/AgentBuild@v1
        with:
          mode: auto
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
